<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - NaturoPatra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=500;600;700&family=Jost:wght=300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #faf8f3;
        --cream-2: #f3efe7;
        --ink: #2b2a26;
        --ink-soft: #5a5850;
        --green-deep: #3c4a34;
        --gold: #b8a06a;
        --line: #dcd6c8;
        --white: #ffffff;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "Jost", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .login-container {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        text-align: center;
      }

      h1 {
        font-family: var(--font-display);
        font-size: 2rem;
        margin-bottom: 8px;
        color: var(--green-deep);
      }

      .subtitle {
        color: var(--ink-soft);
        font-size: 0.95rem;
        margin-bottom: 24px;
      }

      .form-group {
        text-align: left;
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--ink);
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 4px;
        font-family: var(--font-body);
        font-size: 0.95rem;
        background: var(--cream);
        outline: none;
        transition: border 0.2s;
      }

      input:focus {
        border-color: var(--green-deep);
      }

      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        background: var(--gold);
        color: var(--white);
        border: none;
        border-radius: 4px;
        font-family: var(--font-body);
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
      }

      .btn:hover {
        background: #a38c5b;
      }

      .btn-outline {
        display: inline-flex;
        justify-content: center;
        text-decoration: none;
        width: 100%;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink-soft);
        border-radius: 4px;
        font-family: var(--font-body);
        font-size: 1rem;
        margin-top: 14px;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .btn-outline:hover {
        background: var(--cream-2);
        color: var(--ink);
      }

      .toggle-link {
        display: block;
        margin-top: 16px;
        font-size: 0.9rem;
        color: var(--green-deep);
        text-decoration: none;
        cursor: pointer;
      }

      .toggle-link:hover {
        text-decoration: underline;
      }

      .message-zone {
        font-size: 0.85rem;
        margin-top: 12px;
        display: none;
        padding: 10px;
        border-radius: 4px;
      }
      .error {
        color: #c94c4c;
      }
      .success {
        color: #3c4a34;
        background: var(--cream-2);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Inscription</h1>
      <p class="subtitle">Créez votre compte client NaturoPatra</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-email">Adresse e-mail</label>
          <input
            type="email"
            id="signup-email"
            required
            placeholder="exemple@mail.com"
          />
        </div>
        <div class="form-group">
          <label for="signup-password">Mot de passe</label>
          <input
            type="password"
            id="signup-password"
            required
            placeholder="6 caractères minimum"
            minlength="6"
          />
        </div>
        <button type="submit" class="btn">Créer mon compte</button>
      </form>

      <!-- ZONE DE NOTIFICATION -->
      <div id="msg-zone" class="message-zone"></div>

      <a href="login.html" class="toggle-link">Déjà un compte ? Se connecter</a>
      <a href="../index.html" class="btn btn-outline">← Retour à l'accueil</a>
    </div>

    <!-- SDK SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://ymevvaeyxoxwomfdihib.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_J8secXf4UfTMS6WqnLLtkg_RVQwhYjf";

      const supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      const signupForm = document.getElementById("signup-form");
      const msgZone = document.getElementById("msg-zone");

      function afficherMessage(texte, type) {
        msgZone.textContent = texte;
        msgZone.className = `message-zone ${type}`;
        msgZone.style.display = "block";
      }

      function masquerMessage() {
        msgZone.style.display = "none";
      }

      signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        masquerMessage();

        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;

        const { data, error } = await supabase.auth.signUp({ email, password });

        if (error) {
          afficherMessage(`Erreur : ${error.message}`, "error");
        } else {
          if (data.user && data.session === null) {
            afficherMessage(
              "Compte créé ! Vérifiez votre boîte mail pour confirmer votre inscription.",
              "success",
            );
            signupForm.reset();
          } else {
            afficherMessage("Inscription réussie ! Redirection...", "success");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          }
        }
      });
    </script>
  </body>
</html>
